<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>数据资源详情</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../src/css/common.css">
    <script src="../src/data/mock.js"></script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #F3F4F6;
            padding-top: 56px;
            padding-bottom: 20px;
        }
        .top-nav {
            background-color: #030714;
        }
        .info-row {
            display: flex;
            align-items: flex-start;
            padding: 12px 0;
            border-bottom: 1px solid #f3f4f6;
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .info-label {
            width: 80px;
            flex-shrink: 0;
            color: #6b7280;
            font-size: 14px;
        }
        .info-value {
            flex: 1;
            color: #1f2937;
            font-size: 14px;
        }
        .tag-badge {
            display: inline-block;
            padding: 2px 8px;
            background-color: #f3f4f6;
            color: #6b7280;
            border-radius: 4px;
            font-size: 12px;
            margin-right: 4px;
            margin-bottom: 4px;
        }
        .platform-link {
            color: #3B82F6;
            text-decoration: none;
            word-break: break-all;
        }
        .platform-link:active {
            opacity: 0.7;
        }
    </style>
</head>
<body class="bg-gray-100">
    <!-- 顶部导航栏 -->
    <header class="top-nav fixed top-0 left-0 right-0 z-50 shadow-md">
        <div class="flex items-center justify-between px-4 h-14">
            <div class="flex items-center">
                <a href="javascript:history.back()" class="back-btn">
                    <i class="fas fa-arrow-left text-lg"></i>
                </a>
                <span class="text-white text-base font-semibold">数据资源详情</span>
            </div>
            <div class="flex items-center space-x-3">
                <!-- 账号组件 -->
                <div class="avatar-dropdown">
                    <button class="avatar-btn" id="avatarBtn">
                        Z
                    </button>
                    <div class="dropdown-menu">
                        <button class="menu-item logout" onclick="logout()">
                            <i class="fas fa-sign-out-alt"></i>退出登录
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- 主要内容 -->
    <main class="px-4 py-4">
        <!-- 资源基本信息 -->
        <section class="bg-white rounded-xl p-4 shadow-sm mb-4">
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-base font-semibold text-gray-800">
                    <i class="fas fa-database text-blue-500 mr-2"></i>资源信息
                </h2>
                <span class="text-sm font-medium px-3 py-1 rounded-full bg-purple-100 text-purple-600" id="resType">
                    数据集
                </span>
            </div>

            <h3 class="text-lg font-medium text-gray-900 mb-4" id="resName">
                企业工商信息数据
            </h3>

            <div class="space-y-0">
                <div class="info-row">
                    <span class="info-label">资源编码</span>
                    <span class="info-value font-mono" id="resCode">RES001</span>
                </div>
                <div class="info-row">
                    <span class="info-label">来源平台</span>
                    <span class="info-value" id="resSource">公共数据授权运营服务平台</span>
                </div>
                <div class="info-row">
                    <span class="info-label">来源机构</span>
                    <span class="info-value" id="resOrg">上海市大数据中心</span>
                </div>
                <div class="info-row">
                    <span class="info-label">更新频率</span>
                    <span class="info-value" id="resUpdateFreq">每日</span>
                </div>
                <div class="info-row">
                    <span class="info-label">标签</span>
                    <div class="info-value" id="resTags">
                        <span class="tag-badge">工商信息</span>
                        <span class="tag-badge">企业信用</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- 资源描述 -->
        <section class="bg-white rounded-xl p-4 shadow-sm mb-4">
            <h2 class="text-base font-semibold text-gray-800 mb-3">
                <i class="fas fa-file-alt text-blue-500 mr-2"></i>资源描述
            </h2>
            <p class="text-sm text-gray-600 leading-relaxed" id="resDesc">
                加载中...
            </p>
        </section>

        <!-- 申请说明 -->
        <section class="bg-white rounded-xl p-4 shadow-sm mb-4">
            <h2 class="text-base font-semibold text-gray-800 mb-3">
                <i class="fas fa-info-circle text-blue-500 mr-2"></i>申请说明
            </h2>
            <p class="text-sm text-gray-600 leading-relaxed mb-2">
                请用Web端访问进行交易，平台地址：
            </p>
            <a href="https://www.kexindata.com" target="_blank" class="platform-link text-sm font-medium">
                https://www.kexindata.com
            </a>
        </section>
    </main>

    <script>
        // 获取URL参数
        function getUrlParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        // 渲染资源详情
        function renderResourceDetail() {
            const resourceId = getUrlParam('id');
            const resourceName = getUrlParam('name');

            let resource = null;

            // 优先通过ID查找
            if (resourceId) {
                resource = getResourceById(resourceId);
            }
            // 其次通过名称查找
            else if (resourceName) {
                const id = getResourceIdByName(decodeURIComponent(resourceName));
                if (id) {
                    resource = getResourceById(id);
                }
            }

            if (!resource) {
                alert('资源不存在');
                history.back();
                return;
            }

            // 更新页面内容
            document.getElementById('resCode').textContent = resource.code;
            document.getElementById('resName').textContent = resource.name;
            document.getElementById('resType').textContent = resource.type;
            document.getElementById('resSource').textContent = resource.source;
            document.getElementById('resOrg').textContent = resource.organization;
            document.getElementById('resUpdateFreq').textContent = resource.updateFreq || '-';
            document.getElementById('resDesc').textContent = resource.description;

            // 渲染标签
            if (resource.tags && resource.tags.length > 0) {
                document.getElementById('resTags').innerHTML = resource.tags
                    .map(tag => `<span class="tag-badge">${tag}</span>`)
                    .join('');
            }

            // 更新页面标题
            document.title = resource.name + ' - 数据资源详情';
        }

        // 设置账号首字母
        function setAvatarInitial() {
            const avatarBtn = document.getElementById('avatarBtn');
            if (avatarBtn && typeof currentUser !== 'undefined') {
                avatarBtn.textContent = getInitials(currentUser.name);
            }
        }

        // 页面加载时执行
        document.addEventListener('DOMContentLoaded', function() {
            renderResourceDetail();
            setAvatarInitial();
            initDropdownMenus();
        });
    </script>
</body>
</html>
