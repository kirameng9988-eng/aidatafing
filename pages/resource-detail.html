<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>数据资源详情</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../src/css/common.css">
    <script src="../src/data/mock.js"></script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #F3F4F6;
            padding-top: 56px;
            padding-bottom: 80px;
        }
        .info-row {
            display: flex;
            align-items: flex-start;
            padding: 12px 0;
            border-bottom: 1px solid #f3f4f6;
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .info-label {
            width: 80px;
            flex-shrink: 0;
            color: #6b7280;
            font-size: 14px;
        }
        .info-value {
            flex: 1;
            color: #1f2937;
            font-size: 14px;
        }
        .tag-badge {
            display: inline-block;
            padding: 2px 8px;
            background-color: #f3f4f6;
            color: #6b7280;
            border-radius: 4px;
            font-size: 12px;
            margin-right: 4px;
            margin-bottom: 4px;
        }
        .apply-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.2s ease;
        }
        .apply-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body class="bg-gray-100">
    <!-- 顶部导航栏 -->
    <header class="top-nav fixed top-0 left-0 right-0 z-50 shadow-md">
        <div class="flex items-center justify-between px-4 h-14">
            <div class="flex items-center">
                <a href="javascript:history.back()" class="back-btn">
                    <i class="fas fa-arrow-left text-lg"></i>
                </a>
                <img src="../src/images/logo.svg" alt="Logo" class="h-8">
            </div>
            <div class="flex items-center space-x-3">
                <!-- 账号组件 -->
                <div class="avatar-dropdown">
                    <button class="avatar-btn" id="avatarBtn">
                        Z
                    </button>
                    <div class="dropdown-menu">
                        <button class="menu-item logout" onclick="logout()">
                            <i class="fas fa-sign-out-alt"></i>退出登录
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- 主要内容 -->
    <main class="px-4 py-4">
        <!-- 资源基本信息 -->
        <section class="bg-white rounded-xl p-4 shadow-sm mb-4">
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-base font-semibold text-gray-800">
                    <i class="fas fa-database text-blue-500 mr-2"></i>资源信息
                </h2>
                <span class="text-sm font-medium px-3 py-1 rounded-full bg-purple-100 text-purple-600" id="resType">
                    数据集
                </span>
            </div>

            <h3 class="text-lg font-medium text-gray-900 mb-4" id="resName">
                实时线索行为数据
            </h3>

            <div class="space-y-0">
                <div class="info-row">
                    <span class="info-label">资源编码</span>
                    <span class="info-value font-mono" id="resCode">RES001</span>
                </div>
                <div class="info-row">
                    <span class="info-label">来源平台</span>
                    <span class="info-value" id="resSource">神策数据</span>
                </div>
                <div class="info-row">
                    <span class="info-label">来源机构</span>
                    <span class="info-value" id="resOrg">数据中台部</span>
                </div>
                <div class="info-row">
                    <span class="info-label">更新频率</span>
                    <span class="info-value" id="resUpdateFreq">实时</span>
                </div>
                <div class="info-row">
                    <span class="info-label">标签</span>
                    <div class="info-value" id="resTags">
                        <span class="tag-badge">用户行为</span>
                        <span class="tag-badge">埋点数据</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- 资源描述 -->
        <section class="bg-white rounded-xl p-4 shadow-sm mb-4">
            <h2 class="text-base font-semibold text-gray-800 mb-3">
                <i class="fas fa-file-alt text-blue-500 mr-2"></i>资源描述
            </h2>
            <p class="text-sm text-gray-600 leading-relaxed" id="resDesc">
                加载中...
            </p>
        </section>

        <!-- 申请说明 -->
        <section class="bg-white rounded-xl p-4 shadow-sm mb-4">
            <h2 class="text-base font-semibold text-gray-800 mb-3">
                <i class="fas fa-info-circle text-blue-500 mr-2"></i>申请说明
            </h2>
            <p class="text-sm text-gray-600 leading-relaxed">
                点击下方"申请"按钮提交数据访问申请，审批通过后即可访问该数据资源。申请处理时间一般为1-3个工作日。
            </p>
        </section>
    </main>

    <!-- 底部操作按钮 -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 px-4 py-3 z-40">
        <button class="apply-btn w-full text-white py-3 rounded-lg text-sm font-medium shadow-md" id="applyBtn">
            申请
        </button>
    </div>

    <!-- 申请成功提示 -->
    <div id="successModal" class="fixed inset-0 z-50 hidden flex items-center justify-center">
        <div class="absolute inset-0 bg-black bg-opacity-50"></div>
        <div class="bg-white rounded-2xl p-6 shadow-2xl z-10 w-72 text-center">
            <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-check text-3xl text-green-500"></i>
            </div>
            <h3 class="text-lg font-semibold mb-2">申请已提交</h3>
            <p class="text-sm text-gray-500 mb-4">请耐心等待审批结果</p>
            <button class="w-full bg-blue-500 text-white py-2 rounded-lg text-sm" onclick="closeSuccessModal()">
                知道了
            </button>
        </div>
    </div>

    <script>
        // 获取URL参数
        function getUrlParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        // 渲染资源详情
        function renderResourceDetail() {
            const resourceId = getUrlParam('id');
            const resourceName = getUrlParam('name');

            let resource = null;

            // 优先通过ID查找
            if (resourceId) {
                resource = getResourceById(resourceId);
            }
            // 其次通过名称查找
            else if (resourceName) {
                const id = getResourceIdByName(decodeURIComponent(resourceName));
                if (id) {
                    resource = getResourceById(id);
                }
            }

            if (!resource) {
                alert('资源不存在');
                history.back();
                return;
            }

            // 更新页面内容
            document.getElementById('resCode').textContent = resource.code;
            document.getElementById('resName').textContent = resource.name;
            document.getElementById('resType').textContent = resource.type;
            document.getElementById('resSource').textContent = resource.source;
            document.getElementById('resOrg').textContent = resource.organization;
            document.getElementById('resUpdateFreq').textContent = resource.updateFreq || '-';
            document.getElementById('resDesc').textContent = resource.description;

            // 渲染标签
            if (resource.tags && resource.tags.length > 0) {
                document.getElementById('resTags').innerHTML = resource.tags
                    .map(tag => `<span class="tag-badge">${tag}</span>`)
                    .join('');
            }

            // 更新页面标题
            document.title = resource.name + ' - 数据资源详情';
        }

        // 申请权限
        function applyPermission() {
            document.getElementById('successModal').classList.remove('hidden');
        }

        // 关闭成功提示
        function closeSuccessModal() {
            document.getElementById('successModal').classList.add('hidden');
        }

        // 绑定申请按钮事件
        document.getElementById('applyBtn').addEventListener('click', applyPermission);

        // 设置账号首字母
        function setAvatarInitial() {
            const avatarBtn = document.getElementById('avatarBtn');
            if (avatarBtn && currentUser) {
                avatarBtn.textContent = getInitials(currentUser.name);
            }
        }

        // 页面加载时执行
        document.addEventListener('DOMContentLoaded', function() {
            renderResourceDetail();
            setAvatarInitial();
            initDropdownMenus();
        });
    </script>
</body>
</html>
