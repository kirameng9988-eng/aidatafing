<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的需求</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../src/css/common.css">
    <script src="../src/data/mock.js"></script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #F3F4F6;
            padding-bottom: 70px;
            padding-top: 56px;
        }
        .work-order-card {
            transition: all 0.2s ease;
        }
        .work-order-card:active {
            transform: scale(0.98);
        }
        .bottom-tab {
            transition: all 0.2s ease;
        }
        .bottom-tab:active {
            transform: scale(0.95);
        }
        .search-input:focus {
            outline: none;
            border-color: #3B82F6;
        }
        .top-nav {
            background-color: #030714;
        }
        #statusFilter {
            min-width: 90px;
        }
        #statusFilter:focus {
            outline: none;
        }
        .form-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #D1D5DB;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .form-input:focus {
            outline: none;
            border-color: #3B82F6;
        }
        .form-textarea {
            resize: none;
        }
    </style>
</head>
<body class="bg-gray-100">
    <!-- 顶部系统导航栏 -->
    <header class="top-nav fixed top-0 left-0 right-0 z-50 shadow-md">
        <div class="flex items-center justify-between px-4 h-14">
            <!-- 左侧Logo -->
            <div class="flex items-center">
                <img src="../src/images/logo.svg" alt="Logo" class="h-8">
            </div>
            <!-- 右侧功能按钮 -->
            <div class="flex items-center space-x-3">
                <button id="addBtn" class="nav-btn">
                    <i class="fas fa-plus mr-1"></i>新增需求
                </button>
                <!-- 账号组件 -->
                <div class="avatar-dropdown">
                    <button class="avatar-btn" id="avatarBtn">
                        Z
                    </button>
                    <div class="dropdown-menu">
                        <button class="menu-item logout" onclick="logout()">
                            <i class="fas fa-sign-out-alt"></i>退出登录
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- 搜索栏和筛选 -->
    <div class="bg-white px-4 py-3 border-b border-gray-200">
        <div class="flex items-center space-x-2">
            <!-- 搜索框 -->
            <div class="flex-1 relative">
                <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                <input type="text"
                       id="searchInput"
                       placeholder="搜索需求内容、编号..."
                       class="search-input w-full pl-10 pr-4 py-2 bg-gray-100 rounded-lg text-sm border border-transparent">
            </div>
            <!-- 状态筛选下拉 -->
            <div class="relative">
                <select id="statusFilter" class="appearance-none bg-gray-100 border-none rounded-lg px-3 py-2 pr-8 text-sm text-gray-700 cursor-pointer focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="all">全部状态</option>
                    <option value="submitted">需求提交</option>
                    <option value="accepted">已受理</option>
                    <option value="sourcing">寻源中</option>
                    <option value="completed">寻源完成</option>
                    <option value="closed">已关闭</option>
                </select>
                <i class="fas fa-chevron-down absolute right-2 top-1/2 transform -translate-y-1/2 text-gray-400 pointer-events-none text-xs"></i>
            </div>
        </div>
    </div>

    <!-- 需求列表 -->
    <main class="px-4 py-4" id="workOrderList">
        <!-- 需求卡片将通过JS动态生成 -->
    </main>

    <!-- 加载更多提示 -->
    <div class="text-center py-4 text-gray-400 text-sm" id="loadMore">
        <i class="fas fa-chevron-up mr-2"></i>上拉加载更多
    </div>

    <!-- 空状态 -->
    <div class="hidden flex-col items-center justify-center py-20" id="emptyState">
        <i class="fas fa-inbox text-6xl text-gray-300 mb-4"></i>
        <p class="text-gray-400">暂无需求</p>
    </div>

    <!-- 底部Tab导航 -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-40">
        <div class="flex items-center justify-around h-14">
            <a href="../index.html" class="bottom-tab flex flex-col items-center text-gray-400">
                <i class="fas fa-search text-xl mb-1"></i>
                <span class="text-xs">数据寻源</span>
            </a>
            <a href="list.html" class="bottom-tab flex flex-col items-center text-blue-500">
                <i class="fas fa-clipboard-list text-xl mb-1"></i>
                <span class="text-xs">我的需求</span>
            </a>
        </div>
    </nav>

    <!-- 新增需求弹窗 -->
    <div id="addModal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black bg-opacity-50" id="modalOverlay"></div>
        <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-2xl max-h-screen overflow-y-auto">
            <div class="sticky top-0 bg-white px-4 py-3 border-b border-gray-200 flex items-center justify-between z-10">
                <h2 class="text-lg font-semibold text-gray-800">创建数据需求</h2>
                <button id="closeModalBtn" class="text-gray-400">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div class="px-4 py-4">
                <!-- 核心内容 -->
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        核心内容 <span class="text-red-500">*</span>
                    </label>
                    <input type="text"
                           id="coreContentInput"
                           placeholder="请简要描述数据需求的核心内容"
                           class="form-input">
                </div>

                <!-- 覆盖范围 -->
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">覆盖范围</label>
                    <input type="text"
                           id="coverageInput"
                           placeholder="例如：全平台用户、近3年订单等"
                           class="form-input">
                </div>

                <!-- 时间范围 -->
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">时间范围</label>
                    <div class="flex items-center space-x-2">
                        <input type="date" id="startDateInput" class="form-input flex-1">
                        <span class="text-gray-400">至</span>
                        <input type="date" id="endDateInput" class="form-input flex-1">
                    </div>
                </div>

                <!-- 核心字段 -->
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">核心字段</label>
                    <textarea id="coreFieldsInput"
                              placeholder="请列出需要的数据字段，例如：用户ID、行为类型、页面路径..."
                              class="form-input form-textarea"
                              rows="2"></textarea>
                </div>

                <!-- 交付频率 -->
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">交付频率</label>
                    <select id="deliveryFreqInput" class="form-input">
                        <option value="">请选择</option>
                        <option value="实时">实时</option>
                        <option value="T+1">T+1</option>
                        <option value="每日">每日</option>
                        <option value="每周">每周</option>
                        <option value="每月">每月</option>
                        <option value="一次性">一次性</option>
                    </select>
                </div>

                <!-- 预算范围 -->
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">预算范围</label>
                    <select id="budgetInput" class="form-input">
                        <option value="">请选择</option>
                        <option value="5万以内">5万以内</option>
                        <option value="5-10万">5-10万</option>
                        <option value="10-15万">10-15万</option>
                        <option value="15-20万">15-20万</option>
                        <option value="20-30万">20-30万</option>
                        <option value="30-50万">30-50万</option>
                        <option value="50万以上">50万以上</option>
                    </select>
                </div>

                <!-- 合规方案 -->
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">合规方案</label>
                    <input type="text"
                           id="complianceInput"
                           placeholder="例如：数据脱敏、访问审计、权限审批等"
                           class="form-input">
                </div>

                <!-- 备注 -->
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">备注</label>
                    <textarea id="remarkInput"
                              placeholder="其他补充说明..."
                              class="form-input form-textarea"
                              rows="3"></textarea>
                </div>

                <!-- 提交按钮 -->
                <button id="submitBtn" class="w-full bg-blue-500 text-white py-3 rounded-lg text-sm font-medium mt-2 hover:bg-blue-600 transition-colors">
                    提交需求
                </button>
            </div>
        </div>
    </div>

    <!-- 提交成功提示 -->
    <div id="successToast" class="fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-white rounded-2xl p-6 shadow-2xl z-50 hidden">
        <div class="text-center">
            <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-check text-3xl text-green-500"></i>
            </div>
            <h3 class="text-lg font-semibold mb-2">提交成功</h3>
            <p class="text-sm text-gray-500">需求已成功创建</p>
        </div>
    </div>

    <script>
        let currentStatus = 'all';
        let currentSearchText = '';

        // 获取URL参数
        function getUrlParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        // 渲染需求列表
        function renderWorkOrderList() {
            const listContainer = document.getElementById('workOrderList');
            const emptyState = document.getElementById('emptyState');

            let filteredOrders = getWorkOrders(currentStatus);

            // 搜索过滤
            if (currentSearchText) {
                filteredOrders = filteredOrders.filter(order =>
                    order.coreContent.toLowerCase().includes(currentSearchText.toLowerCase()) ||
                    order.id.toLowerCase().includes(currentSearchText.toLowerCase())
                );
            }

            // 按创建时间倒序排列
            filteredOrders.sort((a, b) => {
                const timeA = new Date(a.createTime).getTime();
                const timeB = new Date(b.createTime).getTime();
                return timeB - timeA;
            });

            if (filteredOrders.length === 0) {
                listContainer.innerHTML = '';
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
                document.getElementById('loadMore').classList.add('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            emptyState.classList.remove('flex');
            document.getElementById('loadMore').classList.remove('hidden');

            listContainer.innerHTML = filteredOrders.map(order => `
                <a href="detail.html?id=${order.id}" class="work-order-card block bg-white rounded-xl p-4 shadow-sm mb-3">
                    <div class="flex items-start justify-between mb-2">
                        <h3 class="text-base font-medium text-gray-800 flex-1 pr-2">${order.coreContent}</h3>
                        <span class="text-xs px-2 py-1 rounded-full whitespace-nowrap ${getStatusClass(order.status)}">
                            ${getStatusText(order.status)}
                        </span>
                    </div>
                    <div class="text-xs text-gray-500 mb-2">${order.id}</div>
                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-2">
                            <span class="text-xs px-2 py-1 rounded bg-gray-100 text-gray-600">
                                <i class="fas fa-sync-alt mr-1"></i>${order.deliveryFreq || '未设置'}
                            </span>
                            ${order.budget ? `<span class="text-xs text-gray-400">${order.budget}</span>` : ''}
                        </div>
                        <div class="text-xs text-gray-400">
                            ${formatTime(order.createTime)}
                        </div>
                    </div>
                </a>
            `).join('');
        }

        // 初始化状态筛选
        function initStatusFilter() {
            const statusFromUrl = getUrlParam('status');
            if (statusFromUrl) {
                currentStatus = statusFromUrl;
                document.getElementById('statusFilter').value = statusFromUrl;
            }
        }

        // 状态筛选下拉事件
        document.getElementById('statusFilter').addEventListener('change', function(e) {
            currentStatus = e.target.value;
            renderWorkOrderList();
        });

        // 搜索事件
        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', function(e) {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                currentSearchText = e.target.value;
                renderWorkOrderList();
            }, 300);
        });

        // 打开新增需求弹窗
        document.getElementById('addBtn').addEventListener('click', function() {
            document.getElementById('addModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        });

        // 关闭新增需求弹窗
        function closeAddModal() {
            document.getElementById('addModal').classList.add('hidden');
            document.body.style.overflow = '';
            // 清空表单
            document.getElementById('coreContentInput').value = '';
            document.getElementById('coverageInput').value = '';
            document.getElementById('startDateInput').value = '';
            document.getElementById('endDateInput').value = '';
            document.getElementById('coreFieldsInput').value = '';
            document.getElementById('deliveryFreqInput').value = '';
            document.getElementById('budgetInput').value = '';
            document.getElementById('complianceInput').value = '';
            document.getElementById('remarkInput').value = '';
        }

        document.getElementById('closeModalBtn').addEventListener('click', closeAddModal);
        document.getElementById('modalOverlay').addEventListener('click', closeAddModal);

        // 格式化时间显示
        function formatTime(timeStr) {
            const date = new Date(timeStr);
            const now = new Date();
            const diff = now - date;
            const hours = Math.floor(diff / (1000 * 60 * 60));

            if (hours < 1) {
                return '刚刚';
            } else if (hours < 24) {
                return `${hours}小时前`;
            } else {
                const days = Math.floor(hours / 24);
                if (days < 7) {
                    return `${days}天前`;
                } else {
                    return timeStr.split(' ')[0];
                }
            }
        }

        // 生成需求编号
        function generateWorkOrderId() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const num = String(mockWorkOrders.length + 1).padStart(3, '0');
            return `REQ${year}${month}${day}${num}`;
        }

        // 提交需求
        document.getElementById('submitBtn').addEventListener('click', function() {
            const coreContent = document.getElementById('coreContentInput').value.trim();
            const coverage = document.getElementById('coverageInput').value.trim();
            const startDate = document.getElementById('startDateInput').value;
            const endDate = document.getElementById('endDateInput').value;
            const coreFields = document.getElementById('coreFieldsInput').value.trim();
            const deliveryFreq = document.getElementById('deliveryFreqInput').value;
            const budget = document.getElementById('budgetInput').value;
            const compliance = document.getElementById('complianceInput').value.trim();
            const remark = document.getElementById('remarkInput').value.trim();

            if (!coreContent) {
                alert('请输入核心内容');
                return;
            }

            // 组装时间范围
            let timeRange = '';
            if (startDate && endDate) {
                timeRange = `${startDate} 至 ${endDate}`;
            } else if (startDate) {
                timeRange = `${startDate} 起`;
            }

            // 创建新需求
            const newOrder = {
                id: generateWorkOrderId(),
                coreContent: coreContent,
                coverage: coverage,
                timeRange: timeRange,
                coreFields: coreFields,
                deliveryFreq: deliveryFreq,
                budget: budget,
                compliance: compliance,
                remark: remark,
                status: 'submitted',
                creator: currentUser ? currentUser.name : '用户',
                createTime: new Date().toLocaleString('zh-CN'),
                updateTime: new Date().toLocaleString('zh-CN'),
                timeline: [
                    {
                        time: new Date().toLocaleString('zh-CN'),
                        user: currentUser ? currentUser.name : '用户',
                        action: '提交需求',
                        status: 'submitted',
                        icon: 'fa-plus-circle'
                    }
                ]
            };

            // 添加到模拟数据
            mockWorkOrders.unshift(newOrder);

            // 关闭弹窗
            closeAddModal();

            // 显示成功提示
            const toast = document.getElementById('successToast');
            toast.classList.remove('hidden');
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 1500);

            // 刷新列表
            renderWorkOrderList();
        });

        // 页面加载时执行
        document.addEventListener('DOMContentLoaded', function() {
            initStatusFilter();
            renderWorkOrderList();
            setAvatarInitial();
            initDropdownMenus();
        });

        // 设置账号首字母
        function setAvatarInitial() {
            const avatarBtn = document.getElementById('avatarBtn');
            if (avatarBtn && typeof currentUser !== 'undefined') {
                avatarBtn.textContent = getInitials(currentUser.name);
            }
        }
    </script>
</body>
</html>
